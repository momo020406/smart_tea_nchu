<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑞成智慧茶園 Smart Tea Garden 即時監控儀表板</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f4f7f6; }
        .header { text-align: center; margin-bottom: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .weather-card { grid-column: 1 / -1; background: #e3f2fd; }
        .station-card h3 { color: #2e7d32; border-bottom: 2px solid #2e7d32; padding-bottom: 5px; }
        .data-row { display: flex; justify-content: space-between; margin: 10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌿 瑞成智慧茶園 (Smart Tea Garden) - 即時監控</h1>
        <p id="updateTime">最後更新時間: 載入中...</p>
    </div>

    <div class="grid-container" id="dashboard">
        <!-- 天氣區塊 -->
        <div class="card weather-card">
            <h2>🌤️ 南投縣名間鄉 即時天氣</h2>
            <div class="data-row"><span>天氣狀況</span> <span id="w-status">--</span></div>
            <div class="data-row"><span>氣溫 (°C)</span> <span id="w-temp">--</span></div>
            <div class="data-row"><span>相對濕度 (%)</span> <span id="w-rh">--</span></div>
            <div class="data-row"><span>降雨量 (mm)</span> <span id="w-rain">--</span></div>
        </div>
        <!-- 站點區塊 (由 JS 動態生成) -->
    </div>

    <script>
        async function loadData() {
            try {
                // 從同目錄下的 data.json 讀取 (GitHub Pages)
                const response = await fetch('data.json');
                const data = await response.json();
                
                document.getElementById('updateTime').innerText = `最後更新時間: ${data.update_time}`;
                
                // 天氣
                const weather = data.weather;
                document.getElementById('w-status').innerText = weather.Weather || '--';
                document.getElementById('w-temp').innerText = weather.AirTemperature || '--';
                document.getElementById('w-rh').innerText = weather.RelativeHumidity || '--';
                document.getElementById('w-rain').innerText = weather.Precipitation || '--';

                // 感測器
                const sensors = data.sensors;
                const dash = document.getElementById('dashboard');
                
                // 清除舊站點
                document.querySelectorAll('.station-card').forEach(e => e.remove());

                ['Station1', 'Station2', 'Station3', 'Station4'].forEach(st => {
                    const stData = sensors[st];
                    if(stData) {
                        const card = document.createElement('div');
                        card.className = 'card station-card';
                        card.innerHTML = `
                            <h3>📍 ${st}</h3>
                            <div class="data-row"><span>土壤溫度 (°C)</span> <span>${stData.soil_temp}</span></div>
                            <div class="data-row"><span>土壤濕度 (%)</span> <span>${stData.soil_moisture}</span></div>
                            <div class="data-row"><span>電導率 (EC)</span> <span>${stData.EC}</span></div>
                            <div class="data-row"><span>酸鹼度 (pH)</span> <span>${stData.PH}</span></div>
                            <div class="data-row"><span>氮 (N) mg/kg</span> <span>${stData.Nitrogen}</span></div>
                            <div class="data-row"><span>磷 (P) mg/kg</span> <span>${stData.Phosphorus}</span></div>
                            <div class="data-row"><span>鉀 (K) mg/kg</span> <span>${stData.Potassium}</span></div>
                        `;
                        dash.appendChild(card);
                    }
                });

            } catch (error) {
                console.error("無法載入資料", error);
                document.getElementById('updateTime').innerText = '資料載入失敗，請稍後再試。';
            }
        }

        // 頁面載入時執行
        loadData();
        // 每 60 秒更新一次畫面
        setInterval(loadData, 60000);
    </script>
</body>
</html>
