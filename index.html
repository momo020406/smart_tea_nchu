<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑞成智慧茶園 (Smart Tea Garden)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tea: { 50: '#f0fdf4', 100: '#dcfce7', 600: '#16a34a', 700: '#15803d', 900: '#14532d' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-tea-50 text-gray-800 font-sans p-6 min-h-screen">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-end mb-8 border-b-2 border-tea-600 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-tea-900">🌿 瑞成智慧茶園 (Smart Tea Garden)</h1>
                <p class="text-sm text-gray-500 mt-2">即時監控儀表板 (南投名間鄉)</p>
            </div>
            <div class="text-right">
                <span id="update-time" class="text-sm font-semibold text-tea-700 bg-tea-100 px-3 py-1 rounded-full">連線中...</span>
            </div>
        </header>

        <!-- Weather Section -->
        <section class="bg-white rounded-xl shadow-md p-6 mb-8 border border-tea-100">
            <h2 class="text-xl font-semibold text-tea-800 mb-4 border-l-4 border-tea-600 pl-2">🌤️ 氣象資訊 (南投 名間鄉 C0I410)</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-blue-50 p-4 rounded-lg">
                    <p class="text-gray-500 text-sm">天氣狀況</p>
                    <p id="weather-cond" class="text-xl font-bold text-blue-800">-</p>
                </div>
                <div class="bg-red-50 p-4 rounded-lg">
                    <p class="text-gray-500 text-sm">氣溫</p>
                    <p class="text-xl font-bold text-red-800"><span id="air-temp">-</span> °C</p>
                </div>
                <div class="bg-indigo-50 p-4 rounded-lg">
                    <p class="text-gray-500 text-sm">相對濕度</p>
                    <p class="text-xl font-bold text-indigo-800"><span id="air-humid">-</span> %</p>
                </div>
                <div class="bg-cyan-50 p-4 rounded-lg">
                    <p class="text-gray-500 text-sm">降雨量</p>
                    <p class="text-xl font-bold text-cyan-800"><span id="precip">-</span> mm</p>
                </div>
            </div>
        </section>

        <!-- Stations Grid -->
        <section>
            <h2 class="text-xl font-semibold text-tea-800 mb-4 border-l-4 border-tea-600 pl-2">🌱 觀測站資料</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="stations-container">
                <!-- Data will be injected here via JS -->
            </div>
        </section>
    </div>

    <script>
        const stations = ['Station1', 'Station2', 'Station3', 'Station4'];
        
        function renderStation(id, data) {
            return `
                <div class="bg-white rounded-xl shadow-md p-5 border-t-4 border-tea-600 hover:shadow-lg transition-shadow">
                    <h3 class="text-lg font-bold text-tea-900 mb-3 border-b pb-2">${id}</h3>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between"><span class="text-gray-600">土壤溫度</span> <span class="font-semibold text-red-600">${data.soil_temp || '-'} °C</span></div>
                        <div class="flex justify-between"><span class="text-gray-600">土壤濕度</span> <span class="font-semibold text-blue-600">${data.soil_moisture || '-'} %</span></div>
                        <div class="flex justify-between"><span class="text-gray-600">電導率 (EC)</span> <span class="font-semibold text-yellow-600">${data.ec || '-'} us/cm</span></div>
                        <div class="flex justify-between"><span class="text-gray-600">酸鹼度 (pH)</span> <span class="font-semibold text-purple-600">${data.ph || '-'}</span></div>
                        <div class="flex justify-between mt-2 pt-2 border-t"><span class="text-gray-600">氮 (N)</span> <span class="font-semibold text-green-700">${data.nitrogen || '-'} mg/kg</span></div>
                        <div class="flex justify-between"><span class="text-gray-600">磷 (P)</span> <span class="font-semibold text-orange-600">${data.phosphorus || '-'} mg/kg</span></div>
                        <div class="flex justify-between"><span class="text-gray-600">鉀 (K)</span> <span class="font-semibold text-teal-600">${data.potassium || '-'} mg/kg</span></div>
                    </div>
                </div>
            `;
        }

        async function fetchData() {
            try {
                // Fetch data.json from the same repository (Serverless)
                const cacheBuster = new Date().getTime();
                const res = await fetch('data.json?v=' + cacheBuster);
                const data = await res.json();
                
                // Update Weather
                if (data.weather) {
                    document.getElementById('weather-cond').innerText = data.weather.weather;
                    document.getElementById('air-temp').innerText = data.weather.air_temp;
                    document.getElementById('air-humid').innerText = data.weather.humidity;
                    document.getElementById('precip').innerText = data.weather.precipitation;
                }
                
                // Update Stations
                const container = document.getElementById('stations-container');
                container.innerHTML = '';
                
                stations.forEach(st => {
                    const stData = data.stations && data.stations[st] ? data.stations[st] : {};
                    container.innerHTML += renderStation(st, stData);
                });
                
                document.getElementById('update-time').innerText = "最後更新: " + new Date().toLocaleTimeString();
            } catch (err) {
                console.error("Failed to load data:", err);
                document.getElementById('update-time').innerText = "無法載入資料 (Offline)";
            }
        }

        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
